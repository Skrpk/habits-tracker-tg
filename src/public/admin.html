<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Habits Builder</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --hb-bg: #FAFAF8;
            --hb-surface: #FFFFFF;
            --hb-text: #1A1A1A;
            --hb-text-secondary: #555555;
            --hb-text-muted: #888888;
            --hb-accent: #2D9F6F;
            --hb-accent-light: #E8F5EE;
            --hb-accent-dark: #1E7A52;
            --hb-border: #E5E5E0;
            --hb-card-bg: #F6F6F3;
            --hb-font-display: 'Newsreader', Georgia, serif;
            --hb-font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --hb-danger: #f56565;
        }

        body {
            font-family: var(--hb-font-body);
            background: var(--hb-bg);
            min-height: 100vh;
            padding: 0;
            color: var(--hb-text);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 1.25rem 1.25rem 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 1.25rem;
        }

        .header h1 {
            font-family: var(--hb-font-display);
            font-size: 1.65rem;
            font-weight: 700;
        }

        .filters {
            background: var(--hb-surface);
            border: 1px solid var(--hb-border);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        /* Filter fields flow into columns on wider screens, stack on mobile. */
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.75rem 1rem;
        }

        .filters-grid .row {
            margin-bottom: 0;
        }

        .filters-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .filters-actions .btn-apply,
        .filters-actions .btn-send-msg {
            width: auto;
            margin-top: 0;
            flex: 1 1 220px;
        }

        .filters label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--hb-text-muted);
            margin-bottom: 0.35rem;
        }

        .filters .row {
            margin-bottom: 0.75rem;
        }

        .filters .row:last-of-type {
            margin-bottom: 0;
        }

        .filters select,
        .filters input[type="text"],
        .filters input[type="date"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--hb-border);
            font-family: var(--hb-font-body);
            font-size: 0.95rem;
            background: var(--hb-bg);
            color: var(--hb-text);
        }

        .consent-range-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .btn-apply {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 12px;
            background: var(--hb-accent);
            color: #fff;
            font-family: var(--hb-font-body);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-apply:active {
            opacity: 0.92;
        }

        .btn-send-msg {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.65rem 1rem;
            border: 2px solid var(--hb-accent);
            border-radius: 12px;
            background: var(--hb-surface);
            color: var(--hb-accent-dark);
            font-family: var(--hb-font-body);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-send-msg:active {
            opacity: 0.9;
        }

        .btn-card-send {
            margin-top: 0.65rem;
            padding: 0.5rem 0.85rem;
            border: 1px solid var(--hb-border);
            border-radius: 10px;
            background: var(--hb-card-bg);
            font-family: var(--hb-font-body);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--hb-accent-dark);
            cursor: pointer;
        }

        .btn-lifetime {
            margin-top: 0.5rem;
            margin-right: 0.5rem;
            padding: 0.5rem 0.85rem;
            border: 1px solid var(--hb-accent);
            border-radius: 10px;
            background: var(--hb-accent-light);
            font-family: var(--hb-font-body);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--hb-accent-dark);
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.is-open {
            display: flex;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        .modal-box {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: var(--hb-surface);
            border: 1px solid var(--hb-border);
            border-radius: 16px;
            padding: 1.1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .modal-box h3 {
            font-family: var(--hb-font-display);
            font-size: 1.15rem;
            margin-bottom: 0.75rem;
        }

        .modal-box textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.65rem 0.75rem;
            border-radius: 10px;
            border: 1px solid var(--hb-border);
            font-family: var(--hb-font-body);
            font-size: 0.95rem;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.85rem;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 0.55rem 1rem;
            border-radius: 10px;
            font-family: var(--hb-font-body);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid var(--hb-border);
            background: var(--hb-bg);
        }

        .modal-actions .btn-apply {
            width: auto;
            margin-top: 0;
        }

        .toast-ok {
            padding: 0.75rem 1rem;
            background: var(--hb-accent-light);
            border: 1px solid var(--hb-accent);
            border-radius: 12px;
            color: var(--hb-accent-dark);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
        }

        .loading {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--hb-text-secondary);
        }

        .error {
            padding: 1rem 1.25rem;
            color: #742a2a;
            background: #fed7d7;
            border-radius: 12px;
            border: 1px solid #feb2b2;
            margin-bottom: 1rem;
        }

        /* Count + pagination bar above the results. */
        .results-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.85rem;
        }

        .results-count {
            font-family: var(--hb-font-display);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--hb-text);
        }

        .results-count .range {
            font-family: var(--hb-font-body);
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--hb-text-muted);
            margin-left: 0.4rem;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--hb-border);
            border-radius: 10px;
            background: var(--hb-surface);
            font-family: var(--hb-font-body);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--hb-accent-dark);
            cursor: pointer;
        }

        .page-btn:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .page-info {
            font-size: 0.85rem;
            color: var(--hb-text-secondary);
            min-width: 5.5rem;
            text-align: center;
        }

        /* Results become a responsive card grid on wide screens, 1 column on mobile. */
        #results.results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.75rem;
            align-items: start;
        }

        .user-card {
            background: var(--hb-surface);
            border: 1px solid var(--hb-border);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        #results.results-grid .user-card {
            margin-bottom: 0;
        }

        .user-card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        .meta {
            font-size: 0.85rem;
            color: var(--hb-text-secondary);
            margin-bottom: 0.5rem;
        }

        .habits-list {
            font-size: 0.9rem;
            color: var(--hb-text);
            padding-left: 1.1rem;
        }

        .habits-list li {
            margin-bottom: 0.25rem;
        }

        .user-card-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.35rem;
            margin-top: 0.35rem;
        }

        .empty {
            text-align: center;
            color: var(--hb-text-muted);
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Admin panel</h1>
        </header>

        <section class="filters" id="filters">
            <div class="filters-grid">
                <div class="row">
                    <label for="filterPremium">Premium (isAdmin filter)</label>
                    <select id="filterPremium">
                        <option value="">Any</option>
                        <option value="true">Premium</option>
                        <option value="false">Not premium</option>
                    </select>
                </div>
                <div class="row">
                    <label for="filterBlocked">Blocked</label>
                    <select id="filterBlocked">
                        <option value="">Any</option>
                        <option value="true">Blocked only</option>
                        <option value="false">Not blocked</option>
                    </select>
                </div>
                <div class="row">
                    <label for="filterTz">Timezone</label>
                    <select id="filterTz">
                        <option value="">Any</option>
                    </select>
                </div>
                <div class="row">
                    <label for="filterUserId">User ID (exact match)</label>
                    <input type="text" id="filterUserId" inputmode="numeric" pattern="[0-9]*" placeholder="e.g. 123456789" autocomplete="off" />
                </div>
                <div class="row">
                    <label>Consent date (terms accepted)</label>
                    <div class="consent-range-row">
                        <div>
                            <label for="filterConsentFrom" style="font-size:0.7rem;margin-bottom:0.2rem;">From</label>
                            <input type="date" id="filterConsentFrom" />
                        </div>
                        <div>
                            <label for="filterConsentTo" style="font-size:0.7rem;margin-bottom:0.2rem;">To</label>
                            <input type="date" id="filterConsentTo" />
                        </div>
                    </div>
                </div>
            </div>
            <div class="filters-actions">
                <button type="button" class="btn-apply" id="applyBtn">Apply filters</button>
                <button type="button" class="btn-send-msg" id="sendBulkBtn">Send message</button>
            </div>
        </section>

        <div id="status"></div>
        <div id="resultsBar"></div>
        <div id="results"></div>
    </div>

    <div id="sendModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-box">
            <h3 id="modalTitle">Send message</h3>
            <textarea id="modalMessage" maxlength="4096" placeholder="Message text (max 4096 characters)"></textarea>
            <div class="modal-actions">
                <button type="button" id="modalCancel">Cancel</button>
                <button type="button" class="btn-apply" id="modalConfirm">Send</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            /** Must match src/constants/allowedTimezones.ts ALLOWED_TIMEZONE_IDS (representatives ∪ legacy) */
            var ALLOWED_TIMEZONE_IDS = [
                'Etc/GMT+12', 'Pacific/Niue', 'Pacific/Honolulu', 'America/Anchorage', 'Pacific/Gambier',
                'America/Los_Angeles', 'America/Denver', 'America/Chicago', 'America/New_York',
                'America/Halifax', 'America/St_Johns', 'America/Sao_Paulo', 'Atlantic/South_Georgia',
                'Atlantic/Cape_Verde', 'Europe/London', 'Atlantic/Reykjavik', 'Europe/Rome', 'Europe/Kyiv', 'Europe/Moscow',
                'Asia/Dubai', 'Asia/Karachi', 'Asia/Kolkata', 'Asia/Dhaka', 'Asia/Bangkok',
                'Asia/Shanghai', 'Asia/Tokyo', 'Australia/Adelaide', 'Australia/Darwin', 'Australia/Sydney', 'Australia/Brisbane',
                'Pacific/Guadalcanal', 'Pacific/Auckland', 'Pacific/Tarawa',
                // legacy (still stored for existing users)
                'Pacific/Baker_Island', 'Europe/Paris'
            ];

            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
            }

            var tzSel = document.getElementById('filterTz');
            ALLOWED_TIMEZONE_IDS.forEach(function (tz) {
                var opt = document.createElement('option');
                opt.value = tz;
                opt.textContent = tz;
                tzSel.appendChild(opt);
            });

            function getInitData() {
                return (tg && tg.initData) ? tg.initData : '';
            }

            function buildQuery() {
                var params = new URLSearchParams();
                var prem = document.getElementById('filterPremium').value;
                var blk = document.getElementById('filterBlocked').value;
                var tz = document.getElementById('filterTz').value;
                if (prem === 'true' || prem === 'false') params.set('isAdmin', prem);
                if (blk === 'true' || blk === 'false') params.set('isBlocked', blk);
                if (tz) params.set('Timezone', tz);
                var fUid = document.getElementById('filterUserId').value.trim();
                if (fUid) params.set('userId', fUid);
                var cFrom = document.getElementById('filterConsentFrom').value;
                var cTo = document.getElementById('filterConsentTo').value;
                if (cFrom) params.set('consentDateFrom', cFrom);
                if (cTo) params.set('consentDateTo', cTo);
                var q = params.toString();
                return q ? ('?' + q) : '';
            }

            function buildFilterPayload() {
                var o = {};
                var prem = document.getElementById('filterPremium').value;
                var blk = document.getElementById('filterBlocked').value;
                var tz = document.getElementById('filterTz').value;
                if (prem === 'true') o.isAdmin = true;
                if (prem === 'false') o.isAdmin = false;
                if (blk === 'true') o.isBlocked = true;
                if (blk === 'false') o.isBlocked = false;
                if (tz) o.Timezone = tz;
                var fUid = document.getElementById('filterUserId').value.trim();
                if (fUid && /^\d+$/.test(fUid)) o.userId = Number(fUid);
                var cFrom = document.getElementById('filterConsentFrom').value;
                var cTo = document.getElementById('filterConsentTo').value;
                if (cFrom) o.consentDateFrom = cFrom;
                if (cTo) o.consentDateTo = cTo;
                return o;
            }

            var pendingUserId = null;

            function openSendModal(userId) {
                pendingUserId = userId === undefined || userId === null ? null : userId;
                var title = document.getElementById('modalTitle');
                title.textContent = pendingUserId !== null
                    ? ('Message to user ' + pendingUserId)
                    : 'Message to filtered users';
                document.getElementById('modalMessage').value = '';
                var modal = document.getElementById('sendModal');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
            }

            function closeSendModal() {
                var modal = document.getElementById('sendModal');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                pendingUserId = null;
            }

            async function submitSendMessage() {
                var text = document.getElementById('modalMessage').value.trim();
                if (!text) {
                    return;
                }
                var initData = getInitData();
                if (!initData) {
                    renderError('Open this page from Telegram (initData missing).');
                    closeSendModal();
                    return;
                }
                var payload = Object.assign({ initData: initData, message: text }, buildFilterPayload());
                if (pendingUserId !== null) {
                    payload.id = pendingUserId;
                }
                closeSendModal();
                document.getElementById('status').innerHTML = '<p class="loading">Sending…</p>';
                try {
                    var res = await fetch('/api/send-message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    var body = await res.json().catch(function () { return {}; });
                    if (res.status === 403) {
                        renderError('Access denied.');
                        return;
                    }
                    if (!res.ok) {
                        renderError(body.error || ('Error ' + res.status));
                        return;
                    }
                    var sent = body.sent != null ? body.sent : 0;
                    var failed = body.failed != null ? body.failed : 0;
                    document.getElementById('status').innerHTML =
                        '<div class="toast-ok">Sent: ' + sent + ', failed: ' + failed + '</div>';
                } catch (e) {
                    renderError('Network error.');
                }
            }

            function renderError(msg) {
                document.getElementById('status').innerHTML = '<div class="error">' + msg + '</div>';
                document.getElementById('resultsBar').innerHTML = '';
                var results = document.getElementById('results');
                results.classList.remove('results-grid');
                results.innerHTML = '';
            }

            async function grantLifetimePremium(userId, grant) {
                var initData = getInitData();
                if (!initData) {
                    renderError('Open this page from Telegram (initData missing).');
                    return;
                }
                document.getElementById('status').innerHTML = '<p class="loading">Updating…</p>';
                try {
                    var res = await fetch('/api/grant-lifetime-premium', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ initData: initData, targetUserId: userId, grant: grant })
                    });
                    var body = await res.json().catch(function () { return {}; });
                    if (res.status === 403) {
                        renderError('Access denied.');
                        return;
                    }
                    if (!res.ok) {
                        renderError(body.error || ('Error ' + res.status));
                        return;
                    }
                    await load();
                } catch (e) {
                    renderError('Network error.');
                }
            }

            var PAGE_SIZE = 25;
            var allUsers = [];
            var currentPage = 1;

            function renderUserCard(u) {
                var p = u.preferences || {};
                var habits = u.habits || [];
                var uname = p.telegram && p.telegram.username ? '@' + p.telegram.username : '';
                var bits = ['ID ' + u.userId];
                if (p.timezone) bits.push(p.timezone);
                if (p.premium) bits.push('premium');
                if (p.isLifetimePremium) bits.push('lifetime');
                if (p.blocked) bits.push('blocked');
                if (p.consentDate) bits.push('consent ' + p.consentDate);
                var html = '<article class="user-card">';
                html += '<h2>' + (uname || 'User ' + u.userId) + '</h2>';
                html += '<div class="meta">' + bits.join(' · ') + '</div>';
                if (habits.length) {
                    html += '<ul class="habits-list">';
                    habits.forEach(function (h) {
                        html += '<li>' + escapeHtml(h.name) + ' — streak ' + h.streak + '</li>';
                    });
                    html += '</ul>';
                } else {
                    html += '<p class="meta">No habits</p>';
                }
                html += '<div class="user-card-actions">';
                html += '<button type="button" class="btn-lifetime" data-user-id="' + u.userId + '" data-grant="' + (p.isLifetimePremium ? 'false' : 'true') + '">' +
                    (p.isLifetimePremium ? 'Revoke lifetime' : 'Grant lifetime') + '</button>';
                html += '<button type="button" class="btn-card-send" data-user-id="' + u.userId + '">Send message</button>';
                html += '</div>';
                html += '</article>';
                return html;
            }

            function renderResults() {
                var results = document.getElementById('results');
                var bar = document.getElementById('resultsBar');
                var total = allUsers.length;

                if (!total) {
                    bar.innerHTML = '<div class="results-count">0 leads</div>';
                    results.classList.remove('results-grid');
                    results.innerHTML = '<p class="empty">No users match.</p>';
                    return;
                }

                var pages = Math.ceil(total / PAGE_SIZE);
                if (currentPage > pages) currentPage = pages;
                if (currentPage < 1) currentPage = 1;

                var start = (currentPage - 1) * PAGE_SIZE;
                var end = Math.min(start + PAGE_SIZE, total);
                var pageUsers = allUsers.slice(start, end);

                var countLabel = total + (total === 1 ? ' lead' : ' leads');
                var rangeLabel = pages > 1
                    ? '<span class="range">showing ' + (start + 1) + '–' + end + '</span>'
                    : '';
                var pagination = '';
                if (pages > 1) {
                    pagination =
                        '<div class="pagination">' +
                        '<button type="button" class="page-btn" id="prevPage"' + (currentPage === 1 ? ' disabled' : '') + '>‹ Prev</button>' +
                        '<span class="page-info">Page ' + currentPage + ' / ' + pages + '</span>' +
                        '<button type="button" class="page-btn" id="nextPage"' + (currentPage === pages ? ' disabled' : '') + '>Next ›</button>' +
                        '</div>';
                }
                bar.innerHTML = '<div class="results-count">' + countLabel + rangeLabel + '</div>' + pagination;

                results.classList.add('results-grid');
                results.innerHTML = pageUsers.map(renderUserCard).join('');

                var prev = document.getElementById('prevPage');
                var next = document.getElementById('nextPage');
                if (prev) prev.addEventListener('click', function () { currentPage--; renderResults(); window.scrollTo(0, 0); });
                if (next) next.addEventListener('click', function () { currentPage++; renderResults(); window.scrollTo(0, 0); });
            }

            function renderUsers(data) {
                document.getElementById('status').innerHTML = '';
                allUsers = data.users || [];
                currentPage = 1;
                renderResults();
            }

            function escapeHtml(s) {
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            async function load() {
                document.getElementById('status').innerHTML = '<p class="loading">Loading…</p>';
                document.getElementById('resultsBar').innerHTML = '';
                var results = document.getElementById('results');
                results.classList.remove('results-grid');
                results.innerHTML = '';
                var initData = getInitData();
                if (!initData) {
                    renderError('Open this page from Telegram (initData missing).');
                    return;
                }
                try {
                    var res = await fetch('/api/users' + buildQuery(), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ initData: initData })
                    });
                    var body = await res.json().catch(function () { return {}; });
                    if (res.status === 403) {
                        renderError('Access denied.');
                        return;
                    }
                    if (!res.ok) {
                        renderError(body.error || ('Error ' + res.status));
                        return;
                    }
                    renderUsers(body);
                } catch (e) {
                    renderError('Network error.');
                }
            }

            document.getElementById('applyBtn').addEventListener('click', load);
            document.getElementById('sendBulkBtn').addEventListener('click', function () {
                openSendModal(null);
            });
            document.getElementById('modalCancel').addEventListener('click', closeSendModal);
            document.getElementById('modalBackdrop').addEventListener('click', closeSendModal);
            document.getElementById('modalConfirm').addEventListener('click', submitSendMessage);
            document.querySelector('.container').addEventListener('click', function (e) {
                var t = e.target;
                if (t.classList && t.classList.contains('btn-lifetime')) {
                    var uidL = parseInt(t.getAttribute('data-user-id'), 10);
                    var grant = t.getAttribute('data-grant') === 'true';
                    if (!isNaN(uidL)) grantLifetimePremium(uidL, grant);
                    return;
                }
                if (t.classList && t.classList.contains('btn-card-send')) {
                    var uid = parseInt(t.getAttribute('data-user-id'), 10);
                    if (!isNaN(uid)) openSendModal(uid);
                }
            });
            load();
        })();
    </script>
</body>
</html>
